<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الكادر - مدرسة الطف</title>
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="https://b.top4top.io/p_3738g1q971.png">
    
    <!-- 🛡️ إضافة مكتبة Supabase الرسمية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f4f8; --text: #333; }
        
        /* الوضع الليلي */
        body.dark-mode { --bg: #0f172a; --text: #e2e8f0; --primary: #f8fafc; }
        body.dark-mode header { background: rgba(30, 41, 59, 0.9) !important; border-bottom: 1px solid #334155; }
        body.dark-mode .login-box { background: #1e293b; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        body.dark-mode .input-group input { background: #0f172a; color: white; border-color: #334155; }
        body.dark-mode .input-group .icon { color: #94a3b8; }
        
        /* الخلفية العامة */
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, var(--bg) 0%, #e2e8f0 100%); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }
        body.dark-mode { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }

        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); width: 100%; padding: 15px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: fixed; top: 0; z-index: 100;}
        header img { width: 65px; height: 65px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        
        /* صندوق تسجيل الدخول */
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 20px; margin-top: 80px; }
        .login-box { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid var(--accent); animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .login-box h2 { margin-top: 0; color: var(--primary); font-weight: 800; font-size: 1.5rem; }
        .login-box p { color: #64748b; margin-bottom: 25px; font-size: 0.9rem; font-weight: 600; }
        
        /* حقول الإدخال الاحترافية */
        .input-group { margin-bottom: 20px; text-align: right; position: relative; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.95rem; }
        .input-wrapper { position: relative; }
        .input-group input { width: 100%; padding: 15px 45px 15px 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Cairo'; outline: none; transition: 0.3s; box-sizing: border-box; font-size: 1rem; font-weight: 600; background: #f8fafc; }
        .input-group input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15); }
        
        /* الأيقونات داخل الحقول */
        .input-group .icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.2rem; pointer-events: none; transition: 0.3s; }
        .input-group input:focus + .icon { color: var(--accent); }
        
        /* زر العين لكلمة المرور */
        .eye-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.2rem; padding: 0; outline: none; transition: 0.2s; }
        .eye-btn:hover { color: var(--primary); }

        /* خيار تذكرني */
        .options-row { display: flex; justify-content: flex-start; align-items: center; margin-bottom: 25px; font-size: 0.9rem; font-weight: 600; color: #64748b; cursor: pointer; }
        .options-row input[type="checkbox"] { margin-left: 8px; cursor: pointer; width: 16px; height: 16px; accent-color: var(--accent); }

        .btn-login { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        .btn-login:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(52,152,219,0.4); }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .login-footer { margin-top: 25px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
        .login-footer a { color: var(--accent); text-decoration: none; font-size: 0.95rem; font-weight: 800; transition: 0.3s; display: inline-flex; align-items: center; gap: 5px;}
        .login-footer a:hover { color: var(--primary); transform: translateX(-3px);}
        
        #loading-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; width: 100%; }
        .spinner { border: 4px solid rgba(52, 152, 219, 0.2); border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #custom-toast { visibility: hidden; min-width: 250px; background-color: #e74c3c; color: white; text-align: center; border-radius: 10px; padding: 15px; position: fixed; z-index: 999999; left: 50%; top: -100px; transform: translateX(-50%); font-family: 'Cairo'; box-shadow: 0 4px 15px rgba(0,0,0,0.2); opacity: 0; transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease; font-weight: bold; }
        #custom-toast.show { visibility: visible; top: 20px; opacity: 1; }
    </style>
</head>
<body>

    <div id="custom-toast"></div>

    <header>
        <img src="https://b.top4top.io/p_3738g1q971.png" alt="الشعار">
        <h3 style="margin: 5px 0 0 0; color: var(--primary); font-weight: 800; font-size: 1.1rem;">مدرسة الطف الابتدائية</h3>
    </header>

    <div class="login-wrapper">
        <div id="loading-ui">
            <div class="spinner"></div>
            <h3 style="color: var(--primary);">جاري التحقق من الهوية...</h3>
            <button id="forceLogout" style="margin-top:20px; padding:10px 25px; background:white; border:2px solid #e74c3c; color:#e74c3c; border-radius:10px; cursor:pointer; font-family:'Cairo'; font-weight:bold; transition:0.3s;">إلغاء وتسجيل خروج</button>
        </div>

        <div class="login-box" id="login-ui" style="display: none;">
            <h2>تسجيل الدخول 👨‍🏫</h2>
            <p>مرحباً بك مجدداً، يرجى إدخال بياناتك للمتابعة.</p>
            
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="example@altaf.com" dir="ltr" autocomplete="email">
                    <span class="icon">✉️</span>
                </div>
            </div>
            
            <div class="input-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="pass" placeholder="••••••••" dir="ltr" autocomplete="current-password">
                    <span class="icon">🔒</span>
                    <button type="button" class="eye-btn" id="toggle-pass" tabindex="-1">👁️</button>
                </div>
            </div>

            <label class="options-row">
                <input type="checkbox" id="remember-me" checked>
                تذكرني على هذا الجهاز
            </label>

            <button class="btn-login" id="login-btn" onclick="handleLogin()">تسجيل الدخول</button>
            
            <div class="login-footer">
                <a href="index.html"><span>🏠</span> العودة للصفحة الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        // 🛡️ تم تغيير اسم المتغير إلى _supabase لمنع التعارض مع اسم المكتبة
        const supabaseUrl = 'https://poqswuntarhyjobwfkbl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvcXN3dW50YXJoeWpvYndma2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MjAwNDEsImV4cCI6MjEwMDE5NjA0MX0.Jo3aOtmYey-BVb2EAk0Aa-55jpfbZFHkNVujo4Rqtzs';
        
        // إنشاء الاتصال بالسيرفر الجديد
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const loginUi = document.getElementById('login-ui');
        const loadingUi = document.getElementById('loading-ui');
        const loginBtn = document.getElementById('login-btn');

        // دالة عرض التنبيهات
        window.alert = function(msg) {
            const toast = document.getElementById('custom-toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        };

        // تفعيل الوضع الليلي
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); }

        // إظهار وإخفاء كلمة المرور
        const passInput = document.getElementById('pass');
        const toggleBtn = document.getElementById('toggle-pass');
        toggleBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            toggleBtn.style.opacity = type === 'text' ? '1' : '0.5';
        });

        // 🛡️ 1. نظام مراقبة الجلسة التلقائي
        _supabase.auth.onAuthStateChange((event, session) => {
            if (session && session.user) {
                loadingUi.style.display = "flex";
                loginUi.style.display = "none";
                setTimeout(() => {
                    if(session.user.email === 'admin1@altaf.com' || session.user.email === 'admin@altaf.com') { 
                        window.location.replace("admin.html"); 
                    } else { 
                        window.location.replace("dashboard.html"); 
                    }
                }, 1500);
            } else {
                loginUi.style.display = "block";
                loadingUi.style.display = "none";
            }
        });

        // 🛡️ 2. حماية طوارئ لفتح الصفحة في حال تأخر الاستجابة
        setTimeout(() => {
            if (loginUi.style.display === "none" && loadingUi.style.display !== "none") {
                loginUi.style.display = "block";
                loadingUi.style.display = "none";
            }
        }, 2000);

        // 🛡️ 3. زر إلغاء وتسجيل الخروج
        document.getElementById('forceLogout').onclick = async (e) => {
            e.preventDefault();
            try {
                await _supabase.auth.signOut();
            } catch(err) {
                console.log("تجاوز الخطأ:", err);
            } finally {
                localStorage.clear();
                sessionStorage.clear();
                loginUi.style.display = "block";
                loadingUi.style.display = "none";
            }
        };

        // 🛡️ 4. دالة تسجيل الدخول المحمية
        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = passInput.value;

            if (!email || !pass) { 
                alert("يرجى إدخال البريد الإلكتروني وكلمة المرور بالكامل!"); 
                return; 
            }

            loginBtn.innerText = "جاري التحقق... ⏳"; 
            loginBtn.disabled = true;

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: pass,
                });

                if (error) {
                    throw error;
                }
            } catch (error) {
                loginBtn.innerText = "تسجيل الدخول"; 
                loginBtn.disabled = false;
                alert("عذراً، البريد الإلكتروني أو كلمة المرور غير صحيحة ❌");
            }
        };

        // دعم الدخول عبر زر Enter
        passInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleLogin();
            }
        });
    </script>
</body>
</html>
