<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الكادر - مدرسة الطف</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="https://b.top4top.io/p_3738g1q971.png">
    
    <!-- مشغل Lottie بنقاء HD -->
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #0ea5e9;
            --accent: #f6ad55;
            --bg-light: #f8fafc;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --danger: #ef4444;
            --success: #10b981;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light); 
            color: var(--text-main); 
            margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh; 
        }

        .login-wrapper { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; max-width: 900px; padding: 20px; 
            gap: 30px; flex-wrap: wrap; 
        }
        
        .login-box { 
            background: white; padding: 35px 30px; border-radius: var(--radius); 
            box-shadow: var(--shadow); width: 100%; max-width: 380px; text-align: center; 
            border-top: 5px solid var(--primary);
            border: 1px solid var(--border-color);
            order: 1; 
        }

        .animation-container {
            flex: 1; max-width: 380px; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            order: 2; 
        }

        dotlottie-wc {
            width: 280px !important;
            height: 280px !important;
            display: block;
            margin: 0 auto;
        }

        .login-box h2 { margin-top: 5px; color: var(--text-main); font-weight: 800; font-size: 1.4rem; }
        .login-box p { color: var(--text-muted); margin-bottom: 20px; font-size: 0.85rem; font-weight: 600; }
        
        .input-group { margin-bottom: 18px; text-align: right; position: relative; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 6px; color: var(--text-main); font-size: 0.9rem; }
        .input-wrapper { position: relative; }
        .input-group input { width: 100%; padding: 12px 45px 12px 15px; border: 1.5px solid var(--border-color); border-radius: 10px; font-family: 'Cairo'; outline: none; transition: 0.3s; box-sizing: border-box; font-size: 0.95rem; font-weight: 600; background: #f8fafc; }
        .input-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        
        .input-group .icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; pointer-events: none; }
        .eye-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 0; outline: none; }

        .options-row { display: flex; justify-content: flex-start; align-items: center; margin-bottom: 20px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; }
        .options-row input[type="checkbox"] { margin-left: 8px; cursor: pointer; width: 16px; height: 16px; accent-color: var(--primary); }

        .btn-login { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .btn-login:hover { background: #0284c7; transform: translateY(-2px); }
        
        .login-footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .login-footer a { color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 800; display: inline-flex; align-items: center; gap: 6px;}
        
        #loading-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; width: 100%; }
        .spinner { border: 4px solid rgba(14, 165, 233, 0.2); border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #custom-toast { visibility: hidden; min-width: 250px; background-color: var(--danger); color: white; text-align: center; border-radius: 8px; padding: 14px; position: fixed; z-index: 999999; left: 50%; top: -100px; transform: translateX(-50%); font-family: 'Cairo'; box-shadow: var(--shadow); opacity: 0; transition: top 0.4s ease, opacity 0.4s ease; font-weight: bold; }
        #custom-toast.show { visibility: visible; top: 20px; opacity: 1; }

        /* حل تناسق الأنيميشن التام في شاشات الجوال */
        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; gap: 15px; padding: 15px 10px; justify-content: center; }
            .animation-container { order: -1; width: 100%; max-width: 240px; margin: 0 auto; }
            .animation-container h3, .animation-container p { display: none; }
            dotlottie-wc { width: 200px !important; height: 200px !important; }
            .login-box { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <div id="custom-toast"></div>

    <div class="login-wrapper">
        <div id="loading-ui" style="display: none;">
            <div class="spinner"></div>
            <h3 style="color: var(--text-main); font-size: 1.1rem;">جاري التحقق من الهوية...</h3>
        </div>

        <div class="login-box" id="login-ui">
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;">
                <img src="https://b.top4top.io/p_3738g1q971.png" style="width: 40px; height: 40px; object-fit: contain;">
                <h3 style="margin: 0; color: var(--text-main); font-weight: 800; font-size: 0.95rem;">مدرسة الطف الابتدائية</h3>
            </div>
            
            <h2>تسجيل الدخول</h2>
            <p>مرحباً بك مجدداً، يرجى إدخال بياناتك للمتابعة.</p>
            
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="example@altaf.com" dir="ltr" autocomplete="email">
                    <span class="icon"><i class="fa-solid fa-envelope"></i></span>
                </div>
            </div>
            
            <div class="input-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="pass" placeholder="••••••••" dir="ltr" autocomplete="current-password">
                    <span class="icon"><i class="fa-solid fa-lock"></i></span>
                    <button type="button" class="eye-btn" id="toggle-pass" tabindex="-1"><i class="fa-solid fa-eye"></i></button>
                </div>
            </div>

            <label class="options-row">
                <input type="checkbox" id="remember-me" checked>
                تذكرني على هذا الجهاز
            </label>

            <button class="btn-login" id="login-btn" onclick="handleLogin()">تسجيل الدخول</button>
            
            <div class="login-footer">
                <a href="home.html"><i class="fa-solid fa-house"></i> العودة للصفحة الرئيسية</a>
            </div>
        </div>

        <!-- أنيميشن تسجيل الدخول -->
        <div class="animation-container">
            <dotlottie-wc src="https://lottie.host/a7722a60-a8c8-4757-8a57-b1358eee8bd8/0NctHm9jKz.lottie" autoplay loop></dotlottie-wc>
            <h3 style="color: var(--primary); font-weight: 800; margin-top: 10px;">بوابة الكادر التدريسي</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">إدارة الواجبات، الأوائل، والأنشطة المدرسية بكل سهولة.</p>
        </div>
    </div>

    <script>
        function checkConnection() {
            if (!navigator.onLine) {
                window.location.replace("offline.html");
            }
        }
        window.addEventListener('offline', checkConnection);
        checkConnection();

        const supabaseUrl = 'https://poqswuntarhyjobwfkbl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvcXN3dW50YXJoeWpvYndma2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MjAwNDEsImV4cCI6MjEwMDE5NjA0MX0.Jo3aOtmYey-BVb2EAk0Aa-55jpfbZFHkNVujo4Rqtzs';
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const loginUi = document.getElementById('login-ui');
        const loadingUi = document.getElementById('loading-ui');
        const loginBtn = document.getElementById('login-btn');

        window.alert = function(msg) {
            const toast = document.getElementById('custom-toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        };

        const passInput = document.getElementById('pass');
        const toggleBtn = document.getElementById('toggle-pass');
        toggleBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            toggleBtn.innerHTML = type === 'text' ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye"></i>';
        });

        function getDeviceId() {
            let devId = localStorage.getItem('altaf_device_id');
            if (!devId) {
                devId = 'dev_' + Math.random().toString(36).substring(2, 9) + '_' + Date.now();
                localStorage.setItem('altaf_device_id', devId);
            }
            return devId;
        }

        _supabase.auth.onAuthStateChange((event, session) => {
            if (session && session.user) {
                loadingUi.style.display = "flex";
                loginUi.style.display = "none";
                document.querySelector('.animation-container').style.display = "none";
                setTimeout(() => {
                    if(session.user.email === 'admin1@altaf.com' || session.user.email === 'admin@altaf.com') { 
                        window.location.replace("admin.html"); 
                    } else { 
                        window.location.replace("dashboard.html"); 
                    }
                }, 1200);
            } else {
                loginUi.style.display = "block";
                loadingUi.style.display = "none";
            }
        });

        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = passInput.value;

            if (!email || !pass) { 
                alert("يرجى إدخال البريد الإلكتروني وكلمة المرور بالكامل!"); 
                return; 
            }

            loginBtn.innerText = "جاري التحقق..."; 
            loginBtn.disabled = true;

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: pass,
                });

                if (error) throw error;

                const currentDeviceId = getDeviceId();
                const isTeacher = (email !== 'admin1@altaf.com' && email !== 'admin@altaf.com');

                if (isTeacher && data.user) {
                    await _supabase.from('app_data').delete().eq('type', 'active_session').eq('user_id', data.user.id);
                    await _supabase.from('app_data').insert([{
                        type: 'active_session',
                        user_id: data.user.id,
                        content: { device_id: currentDeviceId, user_email: email, updated_at: new Date().toISOString() }
                    }]);
                }

            } catch (error) { 
                loginBtn.innerText = "تسجيل الدخول"; 
                loginBtn.disabled = false;
                alert("عذراً، البريد الإلكتروني أو كلمة المرور غير صحيحة");
            }
        };

        passInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleLogin();
            }
        });
    </script>
</body>
</html>
