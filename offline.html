<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لا يوجد اتصال - مدرسة الطف</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- مشغل Lottie -->
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            text-align: center;
        }

        .container {
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        dotlottie-wc {
            width: clamp(240px, 70vw, 300px) !important;
            height: clamp(240px, 70vw, 300px) !important;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            color: #0ea5e9;
            font-size: 1.5rem;
            font-weight: 900;
            margin: 10px 0;
        }

        p {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 25px 0;
            font-weight: 700;
        }

        /* تصميم زر إعادة المحاولة المطور بدون رموز */
        .btn {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #ffffff;
            border: none;
            padding: 14px 42px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            box-shadow: 0 8px 20px -4px rgba(14, 165, 233, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            user-select: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -4px rgba(14, 165, 233, 0.5);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 4px 12px -2px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- أنيميشن Lottie -->
        <dotlottie-wc src="https://lottie.host/64274ba3-2047-4c43-b326-9beed6d442e8/SVmGWA4MFM.lottie" autoplay loop></dotlottie-wc>

        <h2>انقطع الاتصال بالإنترنت!</h2>
        <p>يرجى التأكد من تشغيل الواي فاي أو بيانات الهاتف والمحاولة مرة أخرى.</p>
        
        <button class="btn" onclick="checkOnline()">إعادة المحاولة</button>
    </div>

    <script>
        function checkOnline() {
            if (navigator.onLine) {
                window.location.replace('index.html');
            } else {
                alert('ما زلت غير متصل بالإنترنت!');
            }
        }

        // تحويل تلقائي فور عودة النت
        window.addEventListener('online', () => {
            window.location.replace('index.html');
        });
    </script>
</body>
</html>
