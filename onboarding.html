<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مرحباً بك في منصة مدرسة الطف</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>

    <style>
        :root {
            --primary-blue: #0369a1;
            --accent-blue: #0284c7;
            --orange: #f97316;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px 0;
        }

        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(280px, 80vw, 420px);
            height: clamp(280px, 80vw, 420px);
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(249, 115, 22, 0.08) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: 1;
        }

        .splash-card {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 10px 20px;
            max-width: 500px;
            width: 95%;
            margin: auto 0;
        }

        /* تجاوب حجم الأنيميشن مع كافة الشاشات والموبايلات */
        dotlottie-wc {
            width: clamp(240px, 70vw, 320px) !important;
            height: clamp(240px, 70vw, 320px) !important;
            margin-bottom: 5px;
        }

        .brand-title {
            color: var(--primary-blue);
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 900;
            margin-bottom: 2px;
        }

        .brand-subtitle {
            color: var(--orange);
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            font-weight: 800;
            margin-bottom: 15px;
        }

        .counter-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-top: 5px;
        }

        .counter-display {
            font-size: clamp(1.5rem, 5vw, 1.8rem);
            font-weight: 900;
            color: var(--primary-blue);
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .counter-percent {
            font-size: 1.1rem;
            color: var(--orange);
        }

        .status-text {
            font-size: clamp(0.75rem, 3vw, 0.85rem);
            font-weight: 700;
            color: var(--text-muted);
            min-height: 22px;
        }

        .splash-footer {
            position: relative;
            z-index: 10;
            font-size: 0.85rem;
            font-weight: 700;
            color: #94a3b8;
            text-align: center;
            padding-bottom: 15px;
        }

        .splash-footer span {
            color: var(--orange);
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="splash-card">
        <dotlottie-wc src="https://lottie.host/0dbc4ccd-6734-4740-9a4f-2179ecb0c289/wv9aFYb6z1.lottie" autoplay loop></dotlottie-wc>

        <h1 class="brand-title">مدرسة الطَّف الابتدائية للبنين</h1>
        <div class="brand-subtitle">المنصة الرقمية</div>

        <div class="counter-wrapper">
            <div class="counter-display">
                <span id="counterNum">0</span><span class="counter-percent">%</span>
            </div>
            <div class="status-text" id="statusText">جاري الاتصال بالمنصة...</div>
        </div>
    </div>

    <div class="splash-footer">
        تم تطوير هذه المنصة بواسطة <span>مرتضى حسين</span>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const totalDuration = 8000; 
            const intervalTime = 75; 
            const totalSteps = totalDuration / intervalTime;
            let currentStep = 0;

            const counter = document.getElementById('counterNum');
            const statusText = document.getElementById('statusText');

            const statusPhrases = [
                { pct: 0, text: "جاري الاتصال بالمنصة..." },
                { pct: 25, text: "تحديث جدول الواجبات والدروس..." },
                { pct: 60, text: "تهيئة بيانات التلاميذ الكرام..." },
                { pct: 88, text: "أهلاً بك في مدرسة الطف!..." }
            ];

            const timer = setInterval(() => {
                currentStep++;
                const progress = Math.min(Math.round((currentStep / totalSteps) * 100), 100);
                counter.innerText = progress;

                for (let i = statusPhrases.length - 1; i >= 0; i--) {
                    if (progress >= statusPhrases[i].pct) {
                        statusText.innerText = statusPhrases[i].text;
                        break;
                    }
                }

                if (progress >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        // تحويل ذكي بناءً على زيارات المستخدم السابقة
                        const hasSeenOnboarding = localStorage.getItem('hasSeenOnboarding');

                        if (hasSeenOnboarding === 'true') {
                            // دخول سابق -> توجيه مباشر للصفحة الرئيسية
                            window.location.replace('home.html');
                        } else {
                            // أول دخول -> توجيه لدليل المنصة
                            window.location.replace('onboarding.html');
                        }
                    }, 400);
                }
            }, intervalTime);
        });
    </script>
</body>
</html>
